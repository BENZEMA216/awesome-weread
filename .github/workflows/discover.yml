name: Discover new candidates

on:
  schedule:
    # Every 6 hours. Adjust to "0 */2 * * *" for every 2h, "0 6 * * *" for daily.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install discovery deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run discovery
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/discover.mjs

      - name: Commit seen.json updates to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git add seen.json
            git commit -m "chore(bot): update seen.json"
            git push origin HEAD:main
          else
            echo "seen.json unchanged"
          fi

      - name: API key health check (notify + fail if broken)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Idempotent label create (silent if already exists)
          gh label create api-key-down --color B60205 \
            --description "Bot detected Gemini API key failure" 2>/dev/null || true
          gh label create bot --color 5319E7 \
            --description "Opened by automation" 2>/dev/null || true

          if [ -f .api-key-broken ]; then
            echo "::error::API key marker file detected. Opening issue and failing the run."
            cat .api-key-broken

            # Build issue body in a tempfile (heredoc-safe)
            ERROR_TEXT=$(cat .api-key-broken)
            cat > /tmp/issue_body.md <<EOM
## 🚨 Bot detected GOOGLE_API_KEY is broken

The discovery bot got an auth error (401/403/PERMISSION_DENIED) from Gemini and stopped early to avoid burning more calls.

### Error captured

\`\`\`json
$ERROR_TEXT
\`\`\`

### How to recover

1. Generate a new key: https://aistudio.google.com/apikey
2. Rotate the secret:
   \`\`\`bash
   gh secret set GOOGLE_API_KEY --repo BENZEMA216/awesome-weread --body "NEW_KEY"
   \`\`\`
3. Clear failed entries so the bot re-evaluates them:
   \`\`\`bash
   cd ~/awesome-weread && git pull
   python3 -c "import json; d=json.load(open('seen.json')); d=[e for e in d if e['decision']!='llm_error']; open('seen.json','w').write(json.dumps(d,indent=2)+chr(10))"
   git add seen.json && git -c commit.gpgsign=false commit -m 'chore: clear llm_error after key rotation' && git push
   \`\`\`
4. Trigger a manual run:
   \`\`\`bash
   gh workflow run "Discover new candidates" --repo BENZEMA216/awesome-weread
   \`\`\`

This issue will **auto-close** once the next bot run completes without the marker.

— Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
EOM

            existing=$(gh issue list --label 'api-key-down' --state open --json number --jq '.[0].number // empty')
            if [ -n "$existing" ]; then
              echo "Existing issue #$existing — adding heartbeat comment."
              gh issue comment "$existing" --body "Still broken as of $(date -u +%Y-%m-%dT%H:%MZ) · run id ${{ github.run_id }}"
            else
              gh issue create \
                --title "🚨 Bot: GOOGLE_API_KEY broken (auto-detected)" \
                --label "api-key-down,bot" \
                --body-file /tmp/issue_body.md
            fi

            # Fail the job so GitHub auto-emails the repo owner
            exit 1
          fi

          # No marker — if a stale issue is still open, close it
          existing=$(gh issue list --label 'api-key-down' --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Closing stale issue #$existing — bot run succeeded with healthy key."
            gh issue close "$existing" \
              --comment "✓ Bot run succeeded — API key is back online (run ${{ github.run_id }})."
          else
            echo "API key healthy ✓"
          fi

      - name: Open PR if candidates were found
        if: ${{ success() && hashFiles('pr_body.md') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Skip if a bot PR is already open — avoid stacking duplicates.
          existing=$(gh pr list --state open --author "app/github-actions" \
            --json number,title \
            --jq '.[] | select(.title | startswith("[bot] discover")) | .number' | head -1)
          if [ -n "$existing" ]; then
            echo "Existing bot PR #$existing still open. Skipping new PR."
            exit 0
          fi
          ts=$(date -u +%Y%m%d-%H%M)
          branch="bot/discover-$ts"
          git checkout -b "$branch"
          mkdir -p candidates
          mv pr_body.md "candidates/$ts.md"
          git add "candidates/$ts.md"
          git commit -m "bot: discover candidates [$ts]"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "[bot] discover: $ts" \
            --body-file "candidates/$ts.md"
